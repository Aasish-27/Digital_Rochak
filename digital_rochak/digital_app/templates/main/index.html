{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="{% static 'src/styles.css' %}" rel="stylesheet">

  <title>Digital Rochak</title>
</head>

<body class="bg-gradient-to-r from-gray-50 via-white to-gray-100">

  {% include "components/header.html" %}

  <!-- HERO SECTION -->
  <section class="px-5 md:px-16 py-12 md:py-20">

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10 items-center">

      <!-- LEFT CONTENT -->
      <div class="text-center md:text-left">

        <p class="text-blue-500 uppercase tracking-widest text-xs md:text-sm font-semibold mb-4">
          Digital Marketing Expert
        </p>

        <h1 class="text-3xl sm:text-4xl md:text-6xl font-extrabold leading-tight text-gray-800 mb-6">
          I Turn Clicks Into <span class="text-blue-600">Customers</span>
        </h1>

        <p class="text-gray-600 text-base md:text-lg mb-8 max-w-md mx-auto md:mx-0">
          Performance-driven marketing strategies that help businesses grow, reach the right audience, and increase revenue.
        </p>

        <!-- BUTTONS -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center md:justify-start">

          <a href="{% url 'contact' %}"
             class="px-6 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition text-center">
            Hire Me
          </a>

          <a href="{% url 'about' %}"
             class="px-6 py-3 border border-gray-300 rounded-lg hover:bg-gray-100 transition text-center">
            Learn More
          </a>

        </div>

      </div>

      <!-- RIGHT IMAGE -->
      <div class="flex justify-center md:justify-end">

        <div class="relative w-full max-w-sm md:max-w-md">

          <!-- glow background -->
          <div class="absolute inset-0 bg-blue-500/20 blur-3xl rounded-full scale-75"></div>

          <!-- image -->
          <div class="relative bg-gray-900 p-2 rounded-2xl shadow-xl">
            <img
              src="{% static 'img/Hero.JPG' %}"
              alt="Hero Image"
              class="w-full h-[300px] sm:h-[380px] md:h-[420px] object-cover rounded-xl"
            >
          </div>

        </div>

      </div>

    </div>

  </section>

</body>
</html>
