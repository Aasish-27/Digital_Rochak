{% load static %}
<!DOCTYPE html>
<html>
<head>
  <link href="{% static 'src/styles.css' %}" rel="stylesheet">
</head>

<body class="bg-gradient-to-r from-gray-50 via-white to-gray-100">

  {% include "components/header.html" %}

  <section class="px-6 md:px-16 py-16 md:py-20">

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
      
      <!-- Left Content -->
      <div class="text-center md:text-left">

        <p class="text-blue-500 uppercase tracking-wide mb-3 font-semibold text-sm md:text-base">
          Digital Marketing Expert
        </p>

        <h1 class="text-3xl sm:text-4xl md:text-6xl font-extrabold leading-tight mb-6 text-gray-800">
          I Turn Clicks Into <span class="text-blue-600">Customers</span>
        </h1>

        <p class="text-gray-600 text-base md:text-lg mb-8">
          Performance-driven marketing strategies that help your business grow faster,
          reach the right audience, and increase revenue.
        </p>

        <div class="flex flex-col sm:flex-row justify-center md:justify-start gap-4">
          <a href="{% url 'contact' %}"
             class="px-6 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition text-center">
            Hire Me!
          </a>

          <a href="{% url 'about' %}"
             class="px-6 py-3 border border-gray-400 rounded-lg hover:bg-gray-200 transition text-center">
            More about Me
          </a>
        </div>

      </div>

      <!-- Right Content -->
      <div class="relative flex justify-center md:justify-end items-center mt-8 md:mt-0">

        <!-- Background Glow -->
        <div class="absolute w-56 h-56 sm:w-72 sm:h-72 md:w-80 md:h-80 bg-blue-500/20 rounded-full blur-3xl -z-10"></div>

        <!-- Image Card -->
        <div class="relative bg-gray-800 p-2 rounded-2xl shadow-xl">
          <img 
            src="{% static 'img/Hero.JPG' %}" 
            alt="Marketing Dashboard"
            class="rounded-xl h-[280px] sm:h-[350px] md:h-[420px] w-[220px] sm:w-[280px] md:w-[360px] object-cover hover:scale-105 transition duration-500"
          >
        </div>

      </div>

    </div>

  </section>

</body>
</html>
