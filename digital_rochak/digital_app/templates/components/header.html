{% load static %}
<head>
    <link rel="stylesheet" href="{% static 'src/styles.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil+One&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-100">

<header class="sticky top-0 z-50 bg-white shadow-md border-b border-gray-100">

    <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">

        <!-- Logo -->
        <div class="flex items-center gap-3">
            <h1 style="font-family: 'Saira Stencil One', cursive;"
                class="text-3xl border-4 border-gray-400 rounded-full px-4 py-2 inline-block">
                R
            </h1>

            <h2 class="text-3xl font-bold font-[Poppins] text-blue-600">
                Digital Rochak
            </h2>
        </div>

        <!-- Navigation -->
        <nav class="hidden md:flex items-center space-x-8">

            <a href="{% url 'home' %}" class="text-gray-700 hover:text-blue-600 font-medium transition">
                Home
            </a>

            <a href="{% url 'about' %}" class="text-gray-700 hover:text-blue-600 font-medium transition">
                About
            </a>

            <a href="{% url 'services' %}" class="text-gray-700 hover:text-blue-600 font-medium transition">
                Services
            </a>

            <!-- Contact -->
            <div class="flex items-center space-x-2">
                <i class="fas fa-phone text-blue-600"></i>
                <a href="{% url 'contact' %}" class="text-gray-700 hover:text-blue-600 font-medium transition">
                    Contact
                </a>
            </div>

        </nav>

    </div>

</header>

</body>
